<!DOCTYPE html>
<html lang='tr'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Tulpar Saldiri Yollari Grafi</title>
    <link href='${bootstrap_url}' rel='stylesheet'${bootstrap_integrity_attr}>
    <script type='text/javascript' src='${vis_network_url}'${vis_network_integrity_attr}></script>
    <style type='text/css'>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background-color: #0f172a; overflow: hidden; height: 100vh; width: 100vw; }
        #ana_kapsayici { display: flex; flex-direction: row; height: 100vh; width: 100vw; }
        #sol_panel { flex: 0 0 65%; position: relative; background-color: #1e293b; border-right: 2px solid #334155; }
        #sag_panel { flex: 0 0 35%; background-color: #0f172a; display: flex; flex-direction: column; overflow-y: auto; }
        #baslik_alani { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 16px 20px; border-bottom: 2px solid #334155; position: sticky; top: 0; z-index: 10; }
        #baslik_alani h2 { color: #f8fafc; font-size: 1.3rem; font-weight: 700; margin: 0; letter-spacing: -0.3px; }
        #baslik_alani .zafiyet_sayaci { color: #94a3b8; font-size: 0.8rem; margin-top: 2px; }
        #detay_icerik { padding: 20px; flex: 1; }
        #bos_durum { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #475569; text-align: center; padding: 40px; }
        #bos_durum .ikon_buyuk { font-size: 3rem; margin-bottom: 12px; }
        #bos_durum p { font-size: 0.9rem; color: #64748b; }
        .zafiyet_karti { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 18px; margin-bottom: 14px; transition: all 0.2s ease; }
        .zafiyet_karti:hover { border-color: #475569; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .zafiyet_karti .kart_baslik { font-size: 1rem; font-weight: 700; color: #f1f5f9; margin-bottom: 8px; }
        .kritiklik_rozeti { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .kritiklik_rozeti.kritik { background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b; }
        .kritiklik_rozeti.yuksek { background: #78350f; color: #fcd34d; border: 1px solid #92400e; }
        .kritiklik_rozeti.belirsiz { background: #334155; color: #94a3b8; border: 1px solid #475569; }
        .kritiklik_rozeti.bilgilendirme { background: #1e3a5f; color: #93c5fd; border: 1px solid #1e40af; }
        .detay_bolum { margin-top: 10px; border-top: 1px solid #334155; padding-top: 10px; }
        .detay_bolum .detay_baslik { font-size: 0.75rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
        .detay_bolum .detay_metin { font-size: 0.82rem; color: #cbd5e1; line-height: 1.5; margin-bottom: 10px; }
        .komut_kutusu { background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 10px 14px; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 0.72rem; color: #a5f3fc; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
        .risk_skoru_cubugu { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .risk_skoru_cubugu .risk_degeri { font-size: 1.1rem; font-weight: 800; color: #f8fafc; }
        .risk_skoru_cubugu .risk_cubugu_arka { flex: 1; height: 6px; background: #334155; border-radius: 3px; overflow: hidden; }
        .risk_skoru_cubugu .risk_cubugu_dolgu { height: 100%; border-radius: 3px; transition: width 0.3s; }
        #saldiri_agi { width: 100%; height: 100%; }
        #aciklama_cubugu { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.92); backdrop-filter: blur(10px); color: #94a3b8; padding: 8px 18px; border-radius: 20px; font-size: 0.75rem; border: 1px solid #334155; z-index: 500; pointer-events: none; }
        @media (max-width: 900px) {
            #ana_kapsayici { flex-direction: column; }
            #sol_panel { flex: 0 0 55%; }
            #sag_panel { flex: 0 0 45%; }
        }
    </style>
</head>
<body>
    <div id='ana_kapsayici'>
        <div id='sol_panel'>
            <div id='saldiri_agi'></div>
            <div id='aciklama_cubugu'>Dugume tiklayarak detaylari goruntuleyin</div>
        </div>
        <div id='sag_panel'>
            <div id='baslik_alani'>
                <h2>Tulpar Yetki Yukseltme Haritasi</h2>
                <div class='zafiyet_sayaci' id='zafiyet_sayac'></div>
            </div>
            <div id='detay_icerik'>
                <div id='bos_durum'>
                    <div class='ikon_buyuk'>&#128269;</div>
                    <p>Grafikteki bir dugume tiklayarak<br>zafiyet detaylarini bu panelde goruntuleyin</p>
                </div>
            </div>
        </div>
    </div>
    <script type='text/javascript'>
        var zafiyet_sozlugu = ${zafiyet_json};
        var dugum_zafiyet_esleme = ${dugum_zafiyet_json};
        var dugum_verileri = new vis.DataSet(${dugumler_json});
        var kenar_verileri = new vis.DataSet(${kenarlar_json});
        var ag_alani = document.getElementById('saldiri_agi');
        var ag_verisi = {
            nodes: dugum_verileri,
            edges: kenar_verileri
        };
        var ayarlar = {
            physics: {
                stabilization: true,
                solver: 'barnesHut',
                barnesHut: {
                    gravitationalConstant: -3000,
                    centralGravity: 0.3,
                    springLength: 200,
                    springConstant: 0.001,
                    damping: 0.09,
                    avoidOverlap: 0.2
                },
            },
            nodes: {
                shape: 'dot',
                size: 22,
                font: {
                    size: 14,
                    color: '#e2e8f0',
                    face: 'Segoe UI, system-ui, sans-serif',
                    strokeWidth: 1,
                    strokeColor: '#0f172a'
                },
                borderWidth: 2,
                borderWidthSelected: 3,
                color: {
                    border: '#475569',
                    background: '#334155',
                    highlight: {
                        border: '#38bdf8',
                        background: '#1e40af'
                    },
                    hover: {
                        border: '#64748b',
                        background: '#475569'
                    }
                }
            },
            edges: {
                width: 2,
                color: { color: '#475569', highlight: '#38bdf8', hover: '#64748b' },
                smooth: {
                    type: 'curvedCW',
                    roundness: 0.2
                }
            },
            interaction: {
                hover: true,
                tooltipDelay: 200,
                navigationButtons: true,
                keyboard: true
            }
        };
        var saldiri_grafi = new vis.Network(ag_alani, ag_verisi, ayarlar);

        var zafiyet_sayac_elemani = document.getElementById('zafiyet_sayac');
        zafiyet_sayac_elemani.textContent = Object.keys(zafiyet_sozlugu).length + ' zafiyet turu tespit edildi';

        var aciklama_cubugu = document.getElementById('aciklama_cubugu');

        function risk_cubugu_renk_getir(skor) {
            if (skor >= 9.0) return '#ef4444';
            if (skor >= 7.0) return '#f97316';
            if (skor >= 5.0) return '#eab308';
            if (skor >= 3.0) return '#22c55e';
            return '#3b82f6';
        }

        function htmlKacis(metin) {
            if (!metin) return '';
            var gecici = document.createElement('div');
            gecici.appendChild(document.createTextNode(metin));
            return gecici.innerHTML;
        }

        function kritiklik_rozet_sinifi_getir(kritiklik) {
            var kucuk = kritiklik.toLowerCase();
            if (kucuk.indexOf('kritik') !== -1) return 'kritiklik_rozeti kritik';
            if (kucuk.indexOf('yuksek') !== -1 || kucuk.indexOf('yüksek') !== -1) return 'kritiklik_rozeti yuksek';
            if (kucuk.indexOf('bilgi') !== -1) return 'kritiklik_rozeti bilgilendirme';
            return 'kritiklik_rozeti belirsiz';
        }

        function detay_paneli_guncelle(zafiyet_adi) {
            var detay_icerik = document.getElementById('detay_icerik');
            var veri = zafiyet_sozlugu[zafiyet_adi];

            if (!veri) {
                detay_icerik.innerHTML = '<div id="bos_durum"><div class="ikon_buyuk">&#128270;</div><p>Grafikteki bir dugume tiklayarak<br>zafiyet detaylarini bu panelde goruntuleyin</p></div>';
                return;
            }

            var rozet_sinifi = kritiklik_rozet_sinifi_getir(veri.kritiklik);
            var risk_skoru = veri.risk_skoru || '-';
            var risk_genislik = (typeof risk_skoru === 'number') ? (risk_skoru * 10) : 0;
            var risk_rengi = (typeof risk_skoru === 'number') ? risk_cubugu_renk_getir(risk_skoru) : '#334155';

            var html_icerik = '';
            html_icerik += '<div class="zafiyet_karti">';
            html_icerik += '<div class="kart_baslik">' + htmlKacis(zafiyet_adi) + '</div>';
            html_icerik += '<span class="' + rozet_sinifi + '">' + htmlKacis(veri.kritiklik) + '</span>';
            html_icerik += '<div class="risk_skoru_cubugu">';
            html_icerik += '<span class="risk_degeri">' + risk_skoru + '</span>';
            html_icerik += '<span style="font-size:0.65rem;color:#64748b;">/10 Risk Skoru</span>';
            html_icerik += '<div class="risk_cubugu_arka"><div class="risk_cubugu_dolgu" style="width:' + risk_genislik + '%;background:' + risk_rengi + ';"></div></div>';
            html_icerik += '</div>';
            if (veri.scp_kisitlamasi_var !== undefined && veri.scp_kisitlamasi_var !== null) {
                var scp_durum = veri.scp_kisitlamasi_var ? 'SCP Kisitlamasi Var (Yetkiler sinirli olabilir)' : 'SCP Kisitlamasi Yok';
                var scp_renk = veri.scp_kisitlamasi_var ? '#fca5a5' : '#86efac';
                html_icerik += '<div style="font-size:0.72rem;color:' + scp_renk + ';margin-bottom:8px;">' + scp_durum + '</div>';
            }
            html_icerik += '<div class="detay_bolum">';
            html_icerik += '<div class="detay_baslik">Aciklama</div>';
            html_icerik += '<div class="detay_metin">' + htmlKacis(veri.aciklama) + '</div>';
            html_icerik += '</div>';
            html_icerik += '<div class="detay_bolum">';
            html_icerik += '<div class="detay_baslik">CloudTrail Izi</div>';
            html_icerik += '<div class="detay_metin">' + htmlKacis(veri.cloudtrail_izi) + '</div>';
            html_icerik += '</div>';
            html_icerik += '<div class="detay_bolum">';
            html_icerik += '<div class="detay_baslik">Somuru Komutu</div>';
            html_icerik += '<div class="komut_kutusu">' + htmlKacis(veri.somuru_komutu) + '</div>';
            html_icerik += '</div>';
            html_icerik += '<div class="detay_bolum">';
            html_icerik += '<div class="detay_baslik">Mavi Takim Savunma Onerisi</div>';
            html_icerik += '<div class="detay_metin">' + htmlKacis(veri.mavi_takim) + '</div>';
            html_icerik += '</div>';
            html_icerik += '<div class="detay_bolum">';
            html_icerik += '<div class="detay_baslik">Sikilastirma Onerisi</div>';
            html_icerik += '<div class="detay_metin">' + htmlKacis(veri.sikiastirma) + '</div>';
            html_icerik += '</div>';
            html_icerik += '</div>';

            detay_icerik.innerHTML = html_icerik;
        }

        saldiri_grafi.on('click', function(parametreler) {
            if (parametreler.nodes.length > 0) {
                var tiklanan_dugum_id = parametreler.nodes[0];
                var dugum = dugum_verileri.get(tiklanan_dugum_id);
                var dugum_etiketi = dugum.label;
                var zafiyet_adi = dugum_zafiyet_esleme[dugum_etiketi];
                if (zafiyet_adi) {
                    detay_paneli_guncelle(zafiyet_adi);
                    aciklama_cubugu.textContent = 'Secili: ' + dugum_etiketi;
                } else if (dugum_etiketi === 'AdministratorAccess' || dugum_etiketi === 'YoneticiRolu_Ustlenme') {
                    var hedef_html = '';
                    hedef_html += '<div class="zafiyet_karti">';
                    hedef_html += '<div class="kart_baslik">' + htmlKacis(dugum_etiketi) + '</div>';
                    hedef_html += '<span class="' + kritiklik_rozet_sinifi_getir('Kritik') + '">Kritik Hedef</span>';
                    hedef_html += '<div class="risk_skoru_cubugu"><span class="risk_degeri">10.0</span><span style="font-size:0.65rem;color:#64748b;">/10 Risk Skoru</span><div class="risk_cubugu_arka"><div class="risk_cubugu_dolgu" style="width:100%;background:#ef4444;"></div></div></div>';
                    hedef_html += '<div class="detay_bolum">';
                    hedef_html += '<div class="detay_baslik">Aciklama</div>';
                    hedef_html += '<div class="detay_metin">Bu dugum, saldirganin ulasmayi hedefledigi en yuksek yetki seviyesini temsil etmektedir. Bu seviyeye ulasan saldirgan AWS hesabiniz uzerinde tam kontrol saglayabilir.</div>';
                    hedef_html += '</div>';
                    hedef_html += '<div class="detay_bolum">';
                    hedef_html += '<div class="detay_baslik">Mavi Takim Savunma Onerisi</div>';
                    hedef_html += '<div class="detay_metin">En az yetki prensibini uygulayin; yonetici rollerini MFA ile koruyun; CloudTrail loglarini merkezi bir SIEM sistemine aktararak surekli izleyin.</div>';
                    hedef_html += '</div>';
                    hedef_html += '</div>';
                    document.getElementById('detay_icerik').innerHTML = hedef_html;
                    aciklama_cubugu.textContent = 'Secili: ' + dugum_etiketi + ' (Nihai Hedef)';
                } else if (dugum_etiketi === 'Baslangic') {
                    document.getElementById('detay_icerik').innerHTML = '<div id="bos_durum"><div class="ikon_buyuk">&#128736;</div><p>Baslangic dugumu mevcut erisim seviyenizi temsil eder.<br>Saldiri yollari bu dugumden baslayarak ilerler.</p></div>';
                    aciklama_cubugu.textContent = 'Secili: Baslangic (Mevcut Erisim Seviyesi)';
                } else {
                    document.getElementById('detay_icerik').innerHTML = '<div id="bos_durum"><div class="ikon_buyuk">&#128270;</div><p>Bu dugum icin ek detay bilgisi bulunmamaktadir.</p></div>';
                    aciklama_cubugu.textContent = 'Secili: ' + dugum_etiketi;
                }
            }
        });

        saldiri_grafi.on('hoverNode', function(parametreler) {
            var dugum = dugum_verileri.get(parametreler.node);
            aciklama_cubugu.textContent = dugum.label;
        });

        saldiri_grafi.on('blurNode', function() {
            aciklama_cubugu.textContent = 'Dugume tiklayarak detaylari goruntuleyin';
        });

        saldiri_grafi.once('stabilizationIterationsDone', function() {
            saldiri_grafi.setOptions({ physics: false });
        });

        setTimeout(function() {
            if (saldiri_grafi.isStabilized && saldiri_grafi.isStabilized()) {
                saldiri_grafi.setOptions({ physics: false });
            }
        }, 8000);
    </script>
</body>
</html>
